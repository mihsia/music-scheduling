<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./store.js?v=8"></script>
<script src="./support.js?v=8"></script>
<script src="./nav.js?v=8" defer></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; } body { margin:0; }</style>
</helmet>
<div style="font-family:'Fredoka','Noto Sans TC',sans-serif; background:#FAF7F3; color:#2A2740; height:100vh; display:flex; overflow:hidden;">

  <aside style="width:226px; flex:none; background:#2A2740; color:#fff; display:flex; flex-direction:column; padding:22px 16px;">
    <div style="display:flex; align-items:center; gap:11px; padding:4px 8px 22px;">
      <div style="width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#6D54E8,#C25BD6);display:flex;align-items:center;justify-content:center;font-size:20px;">♪</div>
      <div><div style="font-size:17px;font-weight:700;letter-spacing:.5px;">樂排</div><div style="font-size:11px;opacity:.55;">音樂班排課系統</div></div>
    </div>
    <nav style="display:flex; flex-direction:column; gap:3px; margin-top:4px;"></nav>
    <div style="margin-top:auto; display:flex; align-items:center; gap:10px; padding:11px; background:rgba(255,255,255,.07); border-radius:14px;">
      <div style="width:34px;height:34px;border-radius:50%;background:#9A4FE0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">王</div>
      <div style="line-height:1.3;"><div style="font-size:13px;font-weight:600;">王主任</div><div style="font-size:11px;opacity:.55;">教務管理者</div></div>
    </div>
  </aside>

  <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <header style="flex:none; padding:18px 28px; background:#fff; border-bottom:1px solid #EDE8F2; display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div style="font-size:12px; color:#9A93AC; margin-bottom:3px;">學校、課程與權限的基本設定</div>
        <h1 style="margin:0; font-size:22px; font-weight:700;">⚙️ 系統設定</h1>
      </div>
      <div style="flex:none;">{{ saveBar }}</div>
    </header>
    <div style="flex:1; overflow:auto; padding:24px 28px 40px; max-width:860px;">
      {{ sections }}
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { schoolFull:'', schoolShort:'', year:114, term:1, courseLen:45, buffer:10, dayStart:'08:00', dayEnd:'17:00', allowText:'', saved:false };

  componentDidMount() {
    const s = AppStore.getSettings(), r = AppStore.getRules();
    this.setState({
      schoolFull:s.schoolFull, schoolShort:s.schoolShort, year:s.year, term:s.term,
      courseLen:r.courseLen, buffer:r.buffer, dayStart:r.dayStart, dayEnd:r.dayEnd,
      allowText:(s.allowedEmails||[]).join('\n'),
    });
  }
  set(k,v){ this.setState({ [k]:v, saved:false }); }
  save() {
    const emails = this.state.allowText.split(/[\n,;,\s]+/).map(x=>x.trim()).filter(Boolean);
    AppStore.setSettings({ schoolFull:this.state.schoolFull, schoolShort:this.state.schoolShort,
      year:+this.state.year||this.state.year, term:+this.state.term||this.state.term, allowedEmails:emails });
    AppStore.setRules({ courseLen:+this.state.courseLen, buffer:+this.state.buffer, dayStart:this.state.dayStart, dayEnd:this.state.dayEnd });
    this.setState({ saved:true });
    clearTimeout(this._t); this._t = setTimeout(()=>this.setState({ saved:false }), 2600);
  }

  renderVals() {
    const h = React.createElement, st = this.state;
    const cloud = AppStore.mode === 'firebase';

    const card = (title, sub, body) => h('div',{style:{background:'#fff',border:'1px solid #ECE7F2',borderRadius:18,padding:'20px 24px',marginBottom:18,boxShadow:'0 4px 16px rgba(40,30,70,.04)'}},
      h('div',{style:{fontSize:15.5,fontWeight:700,display:'flex',alignItems:'center',gap:9}}, h('span',{style:{width:5,height:18,borderRadius:3,background:'#6D54E8',display:'inline-block'}}), title),
      sub?h('div',{style:{fontSize:12.5,color:'#9A93AC',margin:'5px 0 4px 14px'}},sub):null,
      h('div',{style:{marginTop:10}}, body));
    const row = (label, ctrl, desc) => h('div',{style:{display:'flex',alignItems:'center',gap:14,padding:'13px 4px',borderBottom:'1px solid #F2EFF6'}},
      h('div',{style:{flex:1,minWidth:0}}, h('div',{style:{fontSize:14.5,fontWeight:600}}, label), desc?h('div',{style:{fontSize:12.5,color:'#9A93AC',marginTop:3}},desc):null),
      h('div',{style:{flex:'none'}}, ctrl));
    const text = (k,w) => h('input',{ value:st[k]!=null?st[k]:'', onChange:e=>this.set(k,e.target.value), style:{ width:w||220, border:'1px solid #E2DCEC', borderRadius:9, padding:'9px 11px', fontSize:13.5, color:'#2A2740', background:'#fff', fontFamily:'inherit' } });
    const num = (k,w) => h('input',{ type:'number', value:st[k]!=null?st[k]:'', onChange:e=>this.set(k,e.target.value), style:{ width:w||80, border:'1px solid #E2DCEC', borderRadius:9, padding:'9px 11px', fontSize:13.5, fontFamily:'Fredoka', color:'#2A2740', background:'#fff' } });
    const seg = (k,opts) => h('div',{style:{display:'inline-flex',background:'#F1EEF6',borderRadius:11,padding:4,gap:3}},
      opts.map(o=>{ const on=String(st[k])===String(o); return h('button',{key:o,onClick:()=>this.set(k,o),style:{cursor:'pointer',border:'none',fontFamily:'inherit',fontSize:13,fontWeight:600,padding:'7px 15px',borderRadius:8,background:on?'#6D54E8':'transparent',color:on?'#fff':'#9A93AC'}}, o+' 分'); }));
    const timeSel = (k) => h('input',{ type:'time', value:st[k]||'', onChange:e=>this.set(k,e.target.value),
      style:{ border:'1px solid #E2DCEC', borderRadius:9, padding:'8px 10px', fontSize:13.5, background:'#fff', color:'#2A2740', fontFamily:'Fredoka', width:120 } });

    const sections = h('div',null,
      card('學校基本設定','套用到全站標題、各式通知單與報表', h('div',null,
        row('學校全名', text('schoolFull',240), '正式通知單抬頭'),
        row('學校簡稱', text('schoolShort',240), '手機通知單、Dashboard 等'),
        row('學年度 / 學期', h('div',{style:{display:'flex',alignItems:'center',gap:8}}, num('year'), h('span',{style:{color:'#9A93AC'}},'學年度 第'), num('term',70), h('span',{style:{color:'#9A93AC'}},'學期')), '顯示於各頁與通知單'))),

      card('課程基本設定','每堂個別課的長度與可排課時段', h('div',null,
        row('每堂課長',
          h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}},
            seg('courseLen',[30,40,45,60]),
            h('input',{type:'number',min:5,max:180,step:5,value:st.courseLen,onChange:e=>this.set('courseLen', e.target.value===''?'':(+e.target.value)),
              style:{width:78,border:'1px solid #E2DCEC',borderRadius:9,padding:'9px 11px',fontSize:13.5,fontFamily:'Fredoka',color:'#2A2740',background:'#fff',textAlign:'center'}}),
            h('span',{style:{fontSize:13,color:'#9A93AC'}},'分')),
          '可點選常用值,或直接輸入自訂分鐘數'),
        row('課間緩衝時間', h('div',{style:{display:'flex',alignItems:'center',gap:12,width:230}}, h('input',{type:'range',min:0,max:30,step:5,value:st.buffer,onChange:e=>this.set('buffer',+e.target.value),style:{flex:1}}), h('span',{style:{fontSize:14,fontWeight:700,color:'#6D54E8',fontFamily:'Fredoka',width:46,textAlign:'right'}}, st.buffer+' 分')), '兩堂之間的休息與移動時間'),
        row('可排課時段', h('div',{style:{display:'flex',alignItems:'center',gap:8}}, timeSel('dayStart'), h('span',{style:{color:'#9A93AC'}},'—'), timeSel('dayEnd')), '超出此範圍不開放排課'))),

      card('使用權限（Google 帳號白名單）', cloud?'僅清單內的 Google 帳號可登入操作;留空則任何登入者皆可。':'目前為單機模式,接上 Firebase 後此清單才會生效。', h('div',null,
        h('textarea',{ value:st.allowText, onChange:e=>this.set('allowText',e.target.value), placeholder:'每行一個 Email,例如：\nprincipal@school.edu\nstaff@school.edu',
          style:{ width:'100%', minHeight:110, border:'1px solid #E2DCEC', borderRadius:11, padding:'11px 13px', fontSize:13.5, fontFamily:'monospace', color:'#2A2740', background:'#fff', resize:'vertical' } }),
        h('div',{style:{fontSize:12,color:'#9A93AC',marginTop:8,lineHeight:1.7}},
          '⚠️ 請務必把你自己的 Email 也加入,否則儲存後自己也會被擋。真正的存取控管由 Firestore 安全規則執行(見 firestore.rules / README)。'))));

    const saveBar = h('div',{style:{display:'flex',alignItems:'center',gap:12}},
      st.saved?h('span',{style:{fontSize:13,color:'#1FAE8B',fontWeight:600}},'✓ 已儲存'):null,
      h('button',{ onClick:()=>this.save(), style:{ cursor:'pointer', border:'none', fontFamily:'inherit', fontSize:14, fontWeight:700, padding:'11px 24px', borderRadius:12, color:'#fff', background:'linear-gradient(135deg,#6D54E8,#9A4FE0)', boxShadow:'0 6px 16px rgba(109,84,232,.3)' } }, '儲存設定'));

    return { sections, saveBar };
  }
}
</script>
</body>
</html>
